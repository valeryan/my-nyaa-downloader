services:
  gemma:
    image: ollama/ollama:latest
    container_name: nyaa-gemma
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  gemma-init:
    image: ollama/ollama:latest
    depends_on:
      - gemma
    environment:
      OLLAMA_HOST: http://gemma:11434
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma4:e4b}
    entrypoint:
      - /bin/sh
      - -c
      - |
        MODEL="$${GEMMA_MODEL:-gemma4:e4b}"
        echo "Waiting for Ollama at $$OLLAMA_HOST..."
        until ollama list >/dev/null 2>&1; do
          sleep 2
        done
        echo "Pulling Ollama model: $$MODEL"
        ollama pull "$$MODEL"

volumes:
  ollama-data:
